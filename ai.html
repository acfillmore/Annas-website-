<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rock Paper Scissors</title>
<style>
  body {
    font-family: Arial, sans-serif;
    text-align: center;
    background: #f4f4f4;
    padding: 30px;
  }
  h1 {
    margin-bottom: 20px;
  }
  .buttons button {
    font-size: 18px;
    padding: 10px 20px;
    margin: 10px;
    cursor: pointer;
    border-radius: 8px;
    border: none;
    background-color: #3498db;
    color: white;
  }
  .buttons button:hover {
    background-color: #2980b9;
  }
  .score {
    margin-top: 20px;
    font-size: 20px;
  }
  .result {
    margin-top: 20px;
    font-size: 22px;
    font-weight: bold;
  }
</style>
</head>
<body>

<h1>Rock Paper Scissors</h1>

<div class="buttons">
  <button onclick="play('rock')">Rock</button>
  <button onclick="play('paper')">Paper</button>
  <button onclick="play('scissors')">Scissors</button>
</div>

<div class="result" id="result"></div>

<div class="score">
  You: <span id="userScore">0</span> |
  Computer: <span id="compScore">0</span>
</div>

<script>
let userScore = 0;
let compScore = 0;

function play(userChoice) {
  if (userScore >= 5 || compScore >= 5) return;

  const choices = ['rock', 'paper', 'scissors'];
  const compChoice = choices[Math.floor(Math.random() * 3)];

  let resultText = `You chose ${userChoice}. Computer chose ${compChoice}. `;

  if (userChoice === compChoice) {
    resultText += "It's a tie!";
  } else if (
    (userChoice === 'rock' && compChoice === 'scissors') ||
    (userChoice === 'paper' && compChoice === 'rock') ||
    (userChoice === 'scissors' && compChoice === 'paper')
  ) {
    userScore++;
    resultText += "You win this round!";
  } else {
    compScore++;
    resultText += "Computer wins this round!";
  }

  document.getElementById('userScore').textContent = userScore;
  document.getElementById('compScore').textContent = compScore;
  document.getElementById('result').textContent = resultText;

  if (userScore === 5) {
    document.getElementById('result').textContent += " 🎉 You won the game!";
  } else if (compScore === 5) {
    document.getElementById('result').textContent += " 😢 Computer won the game!";
  }
}
</script>

</body>
</html>
